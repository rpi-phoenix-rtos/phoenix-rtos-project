magic: '{{ env.MAGIC_USER_SCRIPT }}'
size: 0x1000
is_relative: True

contents:
  - kernel {{ env.BOOT_DEVICE }}
  - if: '{{ env.RPI4B_HAVE_DTB | default(false) }}'
    str: blob {{ env.BOOT_DEVICE }} /etc/system.dtb ddr
  - app {{ env.BOOT_DEVICE }} -x dummyfs-root ddr ddr
  - app {{ env.BOOT_DEVICE }} -x dummyfs;-N;devfs;-D ddr ddr
  - app {{ env.BOOT_DEVICE }} -x pl011-tty ddr ddr
  - app {{ env.BOOT_DEVICE }} -x mkdir;/dev ddr ddr
  - app {{ env.BOOT_DEVICE }} -x bind;devfs;/dev ddr ddr
  # Merged design (2026-05-17): the usb daemon now owns BCM2711 PCIe
  # bridge bring-up + VL805 BAR0 programming in-process via libusbxhci's
  # bcm2711_pcie_initVL805(). The standalone `pcie` daemon is no longer
  # spawned because xhci's mmap of the outbound window from a different
  # process hit a per-process bridge-translation race that returned
  # 0xdead-pattern reads. Single-process matches the canonical
  # Phoenix-RTOS USB pattern (imx6ull, imxrt106x/117x, ia32).
  - app {{ env.BOOT_DEVICE }} -x usb ddr ddr
  # GENET Ethernet — launched with one netif cfg arg. Phys 0xFD580000,
  # IRQs 189 (general) / 190 (ring), PHY BCM54213PE at MDIO addr 0x01.
  # Tier 1: link-up only (no DMA, no IRQ wiring).
  - app {{ env.BOOT_DEVICE }} -x lwip;genet:0xFD580000:189:190:PHY:bcm54213pe:0.1:irq:MAC ddr ddr
  - app {{ env.BOOT_DEVICE }} -x psh ddr ddr
  - go!
