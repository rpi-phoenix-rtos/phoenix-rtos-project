magic: '{{ env.MAGIC_USER_SCRIPT }}'
size: 0x1000
is_relative: True

contents:
  - kernel {{ env.BOOT_DEVICE }}
  - if: '{{ env.RPI4B_HAVE_DTB | default(false) }}'
    str: blob {{ env.BOOT_DEVICE }} /etc/system.dtb ddr
  # Root namespace ("/"):
  #   netboot -> dummyfs-root provides a RAM "/" (no SD root).
  #   sd      -> the ext2 partition becomes "/" (mounted below, before the
  #              /-dependent services). dummyfs-root must NOT run in the sd
  #              variant or it would own "/" and the ext2 mount's
  #              portRegister("/") would fail with -EEXIST (#120).
  #   nfsroot -> design-A (#153 T3): a dummyfs RAM "/" comes up FIRST (so
  #              posixsrv/bind/lwip all init normally and sockets resolve),
  #              THEN the NFS server mounts and TAKES OVER "/". So dummyfs-root
  #              IS needed for nfsroot now (unlike the abandoned pre-"/" root
  #              approach) — only the sd variant skips it.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'sd' }}"
    str: app {{ env.BOOT_DEVICE }} -x dummyfs-root ddr ddr
  # devfs registered as the named port "devfs". create_dev(/dev/...) targets this
  # port directly (strips the /dev prefix), so device nodes can be created before
  # "/" or the /dev bind exist -- which is what lets the sd variant mount its root
  # from the SD card below without a prior dummyfs-root.
  - app {{ env.BOOT_DEVICE }} -x dummyfs;-N;devfs;-D ddr ddr
  - app {{ env.BOOT_DEVICE }} -x pl011-tty ddr ddr
  # sd: mount the ext2 partition as "/" HERE, before mkdir/bind/posixsrv (which
  # need "/"). The driver create_dev's /dev/mmcblk0pN via the "devfs" port,
  # resolves it (literal path fails pre-bind -> falls back to "devfs/<name>"),
  # mounts ext2, and portRegister("/") succeeds (no dummyfs-root). (#120)
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'sd' }}"
    str: app {{ env.BOOT_DEVICE }} -x bcm2711-emmc;-r;/dev/mmcblk0p2:ext2 ddr ddr
  # /dev (devfs mountpoint) + /nfstest (NFS mountpoint, #153) created in one
  # mkdir launch — a program name may appear only ONCE as an `app -x` alias
  # within a single rendered boot script (a second `-x mkdir` collides: "alias
  # already in use" → boot bricks). nfsroot does its own mkdir/bind/posixsrv in
  # the design-A block below (it has no /nfstest), so this line and the two
  # below are skipped for it; the nfsroot `-x mkdir;/dev` there is fine because
  # its `if:` gate is mutually exclusive with this one.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x mkdir;/dev;/nfstest ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x bind;devfs;/dev ddr ddr
  # POSIX server: anonymous pipes, /dev/{null,zero,urandom,full}, ptys,
  # tmpfile, event queues. Without it pipe() is -ENOSYS, so psh pipelines
  # (ls | cat) fail. Needs dummyfs-root + devfs bound first (above).
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x posixsrv ddr ddr
  # ===================================================================
  # nfsroot (#153 T3 design-A): NFS export TAKES OVER "/". Ordering is critical.
  # A dummyfs RAM "/" is already up (dummyfs-root above), so we bring up /dev +
  # posixsrv + lwip NORMALLY here (sockets resolve via the real "/"), then the
  # NFS server mounts the export and takes over "/". CRITICAL: `bind devfs /dev`
  # registers /dev in the *dummyfs* root's namespace; once NFS owns "/", that
  # bind is in the OLD root and /dev is GONE on the NFS root. So everything that
  # needs /dev (psh + the device drivers) must launch AFTER a /dev RE-BIND done
  # against the new NFS root — see the post-takeover block further below.
  #   1. mkdir /dev + bind devfs /dev  (on the dummyfs root, lets lwip come up)
  #   2. posixsrv
  #   3. lwip;genet -> DHCP lease + netsocket registration (needs "/", which
  #      exists). MUST precede the NFS server.
  #   4. nfs ... takeover -> normal /dev/ifstatus DHCP-wait + nfs_mount (sockets
  #      work) then take over "/" (mtSetAttr(atDev) splice attempt, else
  #      portUnregister/portRegister). dummyfs-root owns "/" until this fires.
  # (Duplicate `-x mkdir`/`-x bind`/`-x posixsrv`/`-x lwip`/`-x psh` aliases vs
  # the non-nfsroot lines are safe — the `if:` gates are mutually exclusive, so
  # only the rendered survivor counts, same as the two bcm2711-emmc lines.)
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x mkdir;/dev ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x bind;devfs;/dev ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x posixsrv ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x lwip;genet:0xFD580000:189:190:PHY:bcm54213pe:0.1:irq:MAC ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x nfs;/;10.42.0.1;/;v4;takeover ddr ddr
  # nfsroot post-takeover: NFS now owns "/". The /dev bind above lives in the
  # OLD dummyfs root, so /dev would be empty on the NFS root — EXCEPT the NFS
  # takeover server re-binds /dev IN-PROCESS (it splices the "devfs" named port
  # onto its own /dev node before registering "/", see nfs_runTakeover in
  # filesystems/nfs/srv.c). So there is NO second mkdir/bind launch here (which
  # would also collide with the pre-takeover mkdir/bind aliases in this same
  # render); the device nodes live in the untouched "devfs" process, so the
  # in-process re-bind alone restores /dev on the new root.
  # nfsroot device drivers + psh: launched HERE, after the takeover, so they
  # see /dev on the NFS root. (For netboot/sd these run at their normal
  # positions below, gated out of nfsroot.) usb does PCIe/VL805 bring-up;
  # thermal/hwrng/fb/gpio register their /dev nodes; psh is the shell.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-thermal ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-hwrng ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-fb ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-gpio ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-audio ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x usb ddr ddr
  - if: "{{ env.RPI4B_VARIANT | default('netboot') == 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x psh ddr ddr
  # ===================================================================
  # BCM2711 EMMC2 SD-card block driver (#119/#120), netboot variant only:
  # probe-only (no -r), card-out safe, registers /dev/mmcblk0[pN] for inspection.
  # On a card-absent boot it bails gracefully (-ENODEV) and boot continues.
  # (The sd variant launches this driver EARLIER, above, with -r to mount its
  # ext2 root before the /-dependent services.)
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'sd' }}"
    str: app {{ env.BOOT_DEVICE }} -x bcm2711-emmc ddr ddr
  # SoC thermal/throttle telemetry: reads the VideoCore property mailbox and
  # registers /dev/thermal (milli-C) + /dev/throttled (bitfield). Needs devfs
  # bound at /dev (above). Telemetry only - the firmware owns the thermal trip.
  # nfsroot launches this in its post-takeover block (after the /dev re-bind).
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-thermal ddr ddr
  # Hardware RNG (BCM2711 iproc RNG200): registers /dev/hwrng. Needs devfs at /dev.
  # nfsroot launches this in its post-takeover block.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-hwrng ddr ddr
  # VideoCore HDMI framebuffer: registers /dev/fb0 (read/write byte access +
  # geometry devctl) over the plo-allocated 32-bpp surface. Needs devfs at /dev.
  # Read-only at startup (no drawing) so it never disturbs the pl011-tty boot
  # console, which owns the same surface. Bails (-ENODEV) if no framebuffer.
  # netboot variant only: keep the sd variant's exec-from-card path (#120)
  # free of an extra process while that intermittent bug is being debugged.
  # nfsroot launches this in its post-takeover block.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') not in ['sd', 'nfsroot'] }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-fb ddr ddr
  # BCM2711 GPIO observer: registers /dev/gpio (read-only register snapshot +
  # per-pin devctl query). Needs devfs at /dev. netboot variant only (same
  # rationale as rpi4-fb: keep the sd exec-from-card path minimal). nfsroot
  # launches this in its post-takeover block.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') not in ['sd', 'nfsroot'] }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-gpio ddr ddr
  # BCM2711 PWM audio: registers /dev/audio0 (3.5mm jack via PWM1 on GPIO40/41).
  # Brings up the PWM clock + engine and self-logs the state; audible sign-off is
  # attended. netboot variant only (same minimal-sd-path rationale as rpi4-gpio).
  - if: "{{ env.RPI4B_VARIANT | default('netboot') not in ['sd', 'nfsroot'] }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-audio ddr ddr
  # Boot system-info banner (build stamp, uptime, HW-RNG sample, device inventory).
  - if: "{{ env.RPI4B_VARIANT | default('netboot') not in ['sd', 'nfsroot'] }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-sysinfo ddr ddr
  # rpi4-ipcprobe: userspace-API readiness probe (AF_UNIX + libc getrandom/getentropy).
  # Ran 2026-06-17, all PASS (AF_UNIX READY + getrandom/getentropy READY). One-shot;
  # disabled by default. To re-run: re-add to DEFAULT_COMPONENTS (devices) + uncomment.
  # - if: "{{ env.RPI4B_VARIANT | default('netboot') not in ['sd', 'nfsroot'] }}"
  #   str: app {{ env.BOOT_DEVICE }} -x rpi4-ipcprobe ddr ddr
  # V3D GPU scout (Tier 3, GLQuake roadmap): powers on the V3D power domain via
  # the VideoCore mailbox and raw-dumps the V3D MMIO identity region over UART to
  # confirm the core is alive + reachable. One-shot diagnostic; isolated process
  # (a gated-MMIO abort would kill only the scout). netboot variant only.
  # rpi4-v3d-scout disabled: rpi4-v3d-mesa now powers on the V3D itself
  # (v3d_phoenix_power.c). Running both concurrently raced on the V3D clock/reset +
  # the firmware mailbox and hung the boot. Re-enable only if running mesa-harness off.
  # - if: "{{ env.RPI4B_VARIANT | default('netboot') not in ['sd', 'nfsroot'] }}"
  #   str: app {{ env.BOOT_DEVICE }} -x rpi4-v3d-scout ddr ddr
  # Mesa v3d driver harness (GLQuake Path C): runs v3d_screen_create via the ported
  # Mesa driver and reports over UART — first proof the driver INITIALIZES on HW.
  # Boot-launched (netboot only) so its stdout is UART-reliable and it runs before
  # any NFS takeover. ~11 MB program (pulls in the Mesa compiler/NIR).
  # rpi4-v3d-mesa (the hand-built clear/triangle) disabled while validating the GL
  # frontend; only one V3D program may run per boot (they race on clock/reset).
  # - if: "{{ env.RPI4B_VARIANT | default('netboot') not in ['sd', 'nfsroot'] }}"
  #   str: app {{ env.BOOT_DEVICE }} -x rpi4-v3d-mesa ddr ddr
  # rpi4-glclear (green) + rpi4-gldraw (textured triangle, on HDMI) validated. Now
  # rpi4-glcube: an animated, depth-tested, perspective spinning cube through the GL API
  # -- the glgears-or-similar rung demonstrating OpenGL animation on the V3D.
  # - str: app {{ env.BOOT_DEVICE }} -x rpi4-glclear ddr ddr
  # - str: app {{ env.BOOT_DEVICE }} -x rpi4-quake ddr ddr
  # rpi4-quake: the Quakespasm capstone, bundled in loader.disk (boot-launched).
  # Boot-launching avoids the NFS-exec size limit; prints engine init to UART.
  # Launched on netboot + sd (the demo variants): netboot serves /id1/pak0.pak
  # over NFS, the sd variant has it on the ext2 root at /id1; rpi4-quake's
  # wait_for_gamedata probes both, so the same launch works on either.
  # SKIPPED for nfsroot: that variant is the dev/exec-testing path driven by
  # scripted psh, and Quake's continuous render loop floods the UART console,
  # drowning the shell I/O the nfsroot variant exists to exercise.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x rpi4-quake ddr ddr
  # Vulkan V3DV harness (swap in for rpi4-quake): Tier 4a DONE — vkCmdClearColorImage to a
  # scanout-backed image paints HDMI (live fb px0=ff 00 80 ff). Next: render pass + shaders.
  # - app {{ env.BOOT_DEVICE }} -x rpi4-v3dv-tier0 ddr ddr
  # TODO(#129) Step 3 (user-chosen 2026-06-01): USB host stack as a STANDALONE
  # daemon, out of lwip. `usb` does the full BCM2711 PCIe bridge + VL805 xHCI
  # bring-up and hosts the device stack in its OWN process/heap (isolating its
  # DMA pool + driver allocations from lwip, so a USB-side bug can't corrupt the
  # lwIP mbox / kill the network — the #121 UAF). The HID device drivers
  # (usbkbd, usbmouse) are linked INTO the daemon as internal host-side drivers
  # via USB_HOSTDRV_LIBS in build-core-aarch64a72-generic.sh — they create
  # /dev/kbd0 and /dev/mouse0 from within this one process. (That build sets
  # -DUSB_INTERNAL_ONLY, so there is no separate-client connect path; a standalone
  # `-x usbkbd`/`-x usbmouse` would just fail with "unsupported usb_msg type: 0".)
  # Started before lwip so USB bring-up runs early. (No `--bridge-only`: that was
  # the old split where a parked daemon did only the bridge; the merged in-process
  # bring-up is now deterministic — see docs/notes/2026-06-01-usb-rearchitecture-plan.md.)
  # nfsroot launches this in its post-takeover block.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x usb ddr ddr
  # GENET Ethernet — launched with one netif cfg arg. Phys 0xFD580000,
  # IRQs 189 (general) / 190 (ring), PHY BCM54213PE at MDIO addr 0x01.
  # nfsroot launches lwip EARLY (in the design-A block above, before the NFS
  # takeover server), so it is skipped here for that variant.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x lwip;genet:0xFD580000:189:190:PHY:bcm54213pe:0.1:irq:MAC ddr ddr
  # NFS client smoke test (#153 T1): waits for a DHCP lease then mounts an NFS
  # export and reads/writes a file via the libnfs port. argv: server export file.
  # Kept as a baseline/triage probe; the fs server below is the real deliverable.
  # Skipped for nfsroot (the root IS the export — no secondary mount/probe).
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x nfs-smoke;10.42.0.1;/;/etc/hostname ddr ddr
  # NFS filesystem server (#153 T2/T3b): mount the NFS export as a Phoenix
  # filesystem at /nfstest (the mountpoint is created by the single mkdir line
  # above — do NOT add a second `-x mkdir` here). The server portCreate()s,
  # nfs_mount()s, and splices itself under /nfstest via mtSetAttr(atDev) to the
  # root fs (the dummyfs `-m` precedent). argv: mountpoint server export version.
  # Does its own DHCP-wait. NOT root. Skipped for nfsroot (root IS the export).
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x nfs;/nfstest;10.42.0.1;/;v4 ddr ddr
  # psh interactive shell. nfsroot launches it in its post-takeover block (after
  # the /dev re-bind), so it is skipped here for that variant.
  - if: "{{ env.RPI4B_VARIANT | default('netboot') != 'nfsroot' }}"
    str: app {{ env.BOOT_DEVICE }} -x psh ddr ddr
  - go!
